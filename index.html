<div class="custom-contact-section">
  <div class="custom-contact-container">
    
    <div class="contact-info-column">
      <h2 class="agency-title">Vistrea Imobiliare</h2>
      
      <div class="info-item">
        <span class="info-icon">📞</span>
        <a href="tel:0761900350" class="info-text">0761 900 350</a>
      </div>
      
      <div class="info-item">
        <span class="info-icon">✉️</span>
        <a href="mailto:contact@vistrea.ro" class="info-text">contact@vistrea.ro</a>
      </div>
      
      <div class="info-item">
        <span class="info-icon">📍</span>
        <p class="info-text">Soseaua Gh. Ionescu Sisesti nr. 30, sector 1, Bucuresti</p>
      </div>
      
      <div class="social-links">
        <a href="#" target="_blank">TikTok</a>
        <a href="#" target="_blank">Facebook</a>
        <a href="#" target="_blank">Instagram</a>
        <a href="#" target="_blank">WhatsApp</a>
        <a href="#" target="_blank">LinkedIn</a>
      </div>
    </div>

    <div class="contact-form-column">
      <form id="n8n-lead-form">
        
        <div class="form-row">
          <div class="input-group">
            <input type="text" id="name" name="name" placeholder="Numele tau*" required>
          </div>
          
          <div class="input-group">
            <input type="email" id="email" name="email" placeholder="Email">
          </div>
          
          <div class="input-group">
            <input type="tel" id="phone" name="phone" placeholder="Telefon*" required>
          </div>
        </div>
        
        <div class="input-group textarea-group">
          <textarea id="message" name="message" placeholder="Mesaj" rows="4"></textarea>
        </div>
        
        <div class="gdpr-container">
          <input type="checkbox" id="gdpr" name="gdpr" required>
          <label for="gdpr">Sunt de acord cu prelucrarea datelor</label>
        </div>
        
        <div class="form-actions">
          <button type="submit" id="submit-btn">Trimite</button>
        </div>
        
        <div id="form-response-message" class="response-message"></div>
      </form>
    </div>

  </div>
</div>

<style>
/* Stiluri Generale */
.custom-contact-section {
  background-color: #1a1a1a;
  color: #ffffff;
  padding: 60px 40px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  border-radius: 16px;
  max-width: 1200px;
  margin: 0 auto;
}

.custom-contact-container {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
}

.contact-info-column, .contact-form-column {
  flex: 1;
  min-width: 300px;
}

/* Coloana de Informații */
.agency-title {
  font-size: 28px;
  font-weight: 500;
  margin-top: 0;
  margin-bottom: 30px;
  color: #ffffff;
}

.info-item {
  display: flex;
  align-items: center;
  margin-bottom: 20px;
}

.info-icon {
  margin-right: 15px;
  font-size: 16px;
  color: #a3a3a3;
  width: 20px;
  text-align: center;
}

.info-text {
  color: #cccccc;
  text-decoration: none;
  font-size: 15px;
  margin: 0;
  line-height: 1.5;
}

a.info-text:hover {
  color: #ffffff;
}

.social-links {
  display: flex;
  gap: 20px;
  margin-top: 40px;
}

.social-links a {
  color: #888888;
  text-decoration: none;
  font-size: 13px;
  font-weight: 400;
  transition: color 0.2s ease;
}

.social-links a:hover {
  color: #ffffff;
}

/* Formularul de Contact Clean */
.form-row {
  display: flex;
  gap: 15px;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.form-row .input-group {
  flex: 1;
  min-width: 200px;
}

.input-group {
  background-color: #333333;
  border-radius: 6px;
  border: 1px solid #444444;
  transition: border-color 0.2s ease;
}

.input-group:focus-within {
  border-color: #666666;
}

.input-group input, .input-group textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: #ffffff;
  padding: 14px 16px;
  font-size: 14px;
  outline: none;
  box-sizing: border-box;
}

.input-group textarea {
  resize: vertical;
  display: block;
}

.textarea-group {
  margin-bottom: 20px;
}

/* GDPR și Buton */
.gdpr-container {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 25px;
}

.gdpr-container input[type="checkbox"] {
  accent-color: #ffffff;
  cursor: pointer;
  width: 16px;
  height: 16px;
}

.gdpr-container label {
  color: #a3a3a3;
  font-size: 13px;
  cursor: pointer;
}

.form-actions {
  display: flex;
  justify-content: center;
}

#submit-btn {
  background: transparent;
  color: #ffffff;
  border: none;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  padding: 10px 40px;
  transition: opacity 0.2s ease;
}

#submit-btn:hover {
  opacity: 0.8;
}

/* Mesaje de stare */
.response-message {
  margin-top: 15px;
  text-align: center;
  font-size: 14px;
  display: none;
}

.response-message.success {
  color: #4ade80;
  display: block;
}

.response-message.error {
  color: #f87171;
  display: block;
}

@media (max-width: 768px) {
  .custom-contact-container {
    flex-direction: column;
  }
  .form-row {
    flex-direction: column;
    gap: 15px;
  }
}
</style>

<script>
document.getElementById('n8n-lead-form').addEventListener('submit', function(e) {
  e.preventDefault();
  
  const submitBtn = document.getElementById('submit-btn');
  const responseMessage = document.getElementById('form-response-message');
  
  submitBtn.disabled = true;
  submitBtn.innerText = 'Se trimite...';
  
  const formData = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    phone: document.getElementById('phone').value,
    message: document.getElementById('message').value,
    source_url: window.location.href,
    timestamp: new Date().toISOString()
  };

  fetch('https://n8n.srv1241815.hstgr.cloud/webhook/jgfrv0nf34', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(formData)
  })
  .then(response => {
    if (response.ok) {
      responseMessage.className = 'response-message success';
      responseMessage.innerText = 'Mesajul a fost trimis cu succes!';
      document.getElementById('n8n-lead-form').reset();
    } else {
      throw new Error('Eroare server.');
    }
  })
  .catch(error => {
    responseMessage.className = 'response-message error';
    responseMessage.innerText = 'A apărut o eroare. Vă rugăm să încercați din nou.';
  })
  .finally(() => {
    submitBtn.disabled = false;
    submitBtn.innerText = 'Trimite';
  });
});
</script>
